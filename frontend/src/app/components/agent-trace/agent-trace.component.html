<section class="trace">
  <article
    *ngFor="let agent of orderedTrace(); trackBy: trackAgent"
    class="trace-group"
    [class.with-messages]="hasOutboundMessages(agent)"
    [ngClass]="tone(agent)"
  >
    <div class="agent-card">
      <div class="agent-main">
        <div class="agent-title-row">
          <span class="dot"></span>
          <strong>{{ agent.agent_name }}</strong>
          <span class="confidence-chip">{{ confidencePercent(agent.confidence) }} confidence</span>
        </div>
        <p>{{ summary(agent) }}</p>
      </div>

      <div class="agent-meta">
        <span class="role-chip">{{ roleLabel(agent) }}</span>
        <span class="status-chip">{{ statusLabel(agent) }}</span>
      </div>

      <button
        *ngIf="agent.warnings.length || agent.evidence.length || (agent.findings | json) !== '{}'"
        type="button"
        class="details"
        (click)="toggle(agent.agent_name)"
      >
        {{ isExpanded(agent.agent_name) ? 'Hide details' : 'View details' }}
      </button>

      <pre *ngIf="isExpanded(agent.agent_name)">{{ agent.findings | json }}</pre>
    </div>

    <div class="message-list" *ngIf="hasOutboundMessages(agent)">
      <article class="message-card" *ngFor="let message of outboundMessages(agent)">
        <div class="agent-main">
          <div class="agent-title-row">
            <span class="dot"></span>
            <strong>{{ messageTitle(message) }}</strong>
          </div>
          <p>{{ message.content }}</p>
          <small>{{ messageSubtitle(message) }}</small>
        </div>

        <div class="agent-meta">
          <span class="role-chip">{{ messageTypeLabel(message) }}</span>
          <span class="status-chip">MESSAGE</span>
        </div>
      </article>
    </div>
  </article>
</section>
