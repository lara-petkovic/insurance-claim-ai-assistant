<section class="claim-panel">
  <div class="panel-head">
    <h2>Claim Package</h2>
    <p>Verify the policy and event details before starting orchestration.</p>
  </div>

  <label class="field">
    <span>Insurance type</span>
    <select [(ngModel)]="insuranceType">
      <option value="home">Home insurance</option>
      <option value="travel">Travel insurance</option>
      <option value="auto">Auto insurance</option>
    </select>
  </label>

  <label class="field">
    <span>Incident date</span>
    <input type="date" [(ngModel)]="incidentDate">
  </label>

  <label class="field">
    <span>Claim description</span>
    <textarea rows="6" [(ngModel)]="claimDescription" placeholder="Describe the real incident, cause, date, location, and visible damage."></textarea>
  </label>

  <label class="file-card">
    <span class="label">Policy PDF or text</span>
    <input type="file" accept=".pdf,.txt,.md" (change)="selectPolicy($event)">
    <b>{{ policyFile?.name || 'Select policy document' }}</b>
    <small>{{ policyFile ? 'Ready for extraction' : 'PDF, TXT or MD required' }}</small>
  </label>

  <label class="evidence-card">
    <span class="label">Damage image</span>
    <input type="file" accept="image/*" (change)="selectImage($event)">
    <div class="image-preview">
      <span>IMG</span>
    </div>
    <b>{{ damageImage?.name || 'Optional image evidence' }}</b>
    <small>{{ damageImage ? 'Queued for visual agent' : 'JPG, PNG or WEBP' }}</small>
  </label>

  <label class="file-card">
    <span class="label">Supporting documents</span>
    <input type="file" multiple accept=".pdf,.txt,.jpg,.jpeg,.png,.webp" (change)="selectSupportingDocuments($event)">
    <b>{{ supportingDocuments.length ? supportingDocuments.length + ' selected' : 'Optional supporting evidence' }}</b>
    <small>Reports, photos, invoices</small>
  </label>

  <button class="analyze" type="button" (click)="analyze()" [disabled]="!claimDescription.trim() || !policyFile">
    {{ policyFile ? 'Update Submission' : 'Attach Policy To Start' }}
  </button>

  <p class="error" *ngIf="error">{{ error }}</p>
</section>
